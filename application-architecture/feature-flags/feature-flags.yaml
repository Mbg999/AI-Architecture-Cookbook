    category: reliability
    description: "All feature flags have metadata: owner, creation date, expected removal"
    severity: high
    verified_by: release_toggle

  - id: FF-02
    category: reliability
    description: "Stale flag detection alerts on flags past expected removal date"
    severity: high
    verified_by: release_toggle

  - id: FF-03
    category: reliability
    description: "Flag evaluation at entry points, not deep in business logic"
    severity: medium
    verified_by: release_toggle

  - id: FF-04
    category: reliability
    description: "Progressive rollout uses sticky targeting (consistent user experience)"
    severity: high
    verified_by: progressive_rollout

  - id: FF-05
    category: reliability
    description: "Automated rollback criteria defined for progressive rollouts"
    severity: high
    verified_by: progressive_rollout

  - id: FF-06
    category: reliability
    description: "Operational kill switches tested in chaos experiments"
    severity: high
    verified_by: operational_toggle

  - id: FF-07
    category: reliability
    description: "Flag changes audit-logged with who, what, when"
    severity: high
    verified_by: release_toggle

  - id: FF-08
    category: reliability
    description: "Flag service unavailability defaults to safe values"
    severity: high
    verified_by: release_toggle
