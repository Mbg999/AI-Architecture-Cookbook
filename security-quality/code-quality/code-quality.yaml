    category: maintainability
    description: "Linter configured with enforced rules for primary language"
    severity: high
    verified_by: automated_quality_gates

  - id: CQ-02
    category: maintainability
    description: "Formatter enforced — zero style debates in code reviews"
    severity: high
    verified_by: automated_quality_gates

  - id: CQ-03
    category: security
    description: "SAST tool running in CI (SonarQube, Semgrep, or CodeQL)"
    severity: high
    verified_by: automated_quality_gates

  - id: CQ-04
    category: security
    description: "Secret scanning in pre-commit hooks and CI"
    severity: critical
    verified_by: automated_quality_gates

  - id: CQ-05
    category: security
    description: "Dependency vulnerability scanning in CI"
    severity: high
    verified_by: automated_quality_gates

  - id: CQ-06
    category: maintainability
    description: "Code review required before merge (min 1 approval)"
    severity: high
    verified_by: code_review_standards

  - id: CQ-07
    category: maintainability
    description: "PRs kept small (target <400 lines changed)"
    severity: medium
    verified_by: code_review_standards

  - id: CQ-08
    category: maintainability
    description: "Quality metrics tracked over time (complexity, coverage, duplication)"
    severity: medium
    verified_by: automated_quality_gates

  - id: CQ-09
    category: maintainability
    description: "Architecture fitness functions enforce dependency rules"
    severity: medium
