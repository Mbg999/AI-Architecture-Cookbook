# =============================================================================
# AI Architecture Cookbook — Error Handling & Resilience
# Schema: v3 | Domain: error-handling
# =============================================================================

meta:
  schema_version: 3
  domain: error-handling
  version: "1.0.0"
  last_updated: 2026-04-22
  description: >
    Error handling and resilience decision framework covering circuit breakers,
    retries, fallbacks, bulkheads, and structured error responses for building
    fault-tolerant distributed systems.

  tags:
    - resilience
    - errors
    - circuit-breaker
    - retry
    - fallback
    - bulkhead
    - fault-tolerance

  categories:
    - foundational

  prerequisites: []

  related_standards:
    - id: logging-observability
      relationship: complementary
      context: "All errors must be logged and monitored per logging-observability standard"
    - id: api-design
      relationship: complementary
      context: "APIs must return structured error responses per this standard"
    - id: messaging-events
      relationship: complementary
      context: "Async messaging failures require dead-letter queues and retry policies"

context_inputs:
  - name: system_type
    type: enum
    description: "Architecture style of the system"
    required: true
    default: distributed
    enum_values:
      - monolith
      - distributed
      - serverless
      - hybrid

  - name: failure_tolerance
    type: enum
    description: "How critical is uptime? Determines resilience investment"
    required: true
    default: high
    enum_values:
      - low
      - medium
      - high
      - critical

  - name: downstream_reliability
    type: enum
    description: "How reliable are downstream dependencies?"
    required: true
    default: variable
    enum_values:
      - reliable
      - variable
      - unreliable

  - name: error_visibility
    type: enum
    description: "Who sees the errors — end users, developers, or both?"
    required: true
    default: both
    enum_values:
      - users_only
      - developers_only
      - both

  - name: idempotent_operations
    type: boolean
    description: "Are the operations safe to retry (idempotent)?"
    required: true
    default: false

  - name: latency_budget
    type: enum
    description: "Maximum acceptable response time including retries"
    required: false
    default: standard
    enum_values:
      - tight
      - standard
      - relaxed

decision_tree:
  - id: unreliable_needs_circuit_breaker
    priority: 1
    if:
      - downstream_reliability in [variable, unreliable]
      - system_type in [distributed, hybrid]
    then:
      pattern: circuit_breaker
      standards:
        - Circuit Breaker Pattern
      notes: "Unreliable downstream services in distributed systems require circuit breakers to prevent cascade failures"
    else:
      pattern: structured_error_response
      notes: "Reliable dependencies in monolith — focus on structured error responses"

  - id: critical_needs_bulkhead
    priority: 2
    if:
      - failure_tolerance == critical
      - system_type in [distributed, hybrid]
    then:
      pattern: bulkhead_isolation
      standards:
        - Bulkhead Pattern
      notes: "Critical uptime requires isolating failures to prevent total system collapse"

  - id: idempotent_allows_retry
    priority: 3
    if:
      - idempotent_operations == true
      - downstream_reliability in [variable, unreliable]
    then:
      pattern: retry_with_backoff
      standards:
        - Exponential Backoff
      notes: "Idempotent operations can be safely retried with exponential backoff"
    else:
      pattern: structured_error_response
      notes: "Non-idempotent operations cannot be blindly retried — return structured error with guidance"

  - id: user_facing_needs_structured_errors
    priority: 4
    if:
      - error_visibility in [users_only, both]
    then:
      pattern: structured_error_response
      standards:
        - RFC 9457 (Problem Details for HTTP APIs)
      notes: "User-facing errors must be structured, safe, and actionable"

decision_metadata:
  confidence: high
  risk_if_wrong: high
  fallback:
    pattern: structured_error_response
    description: "Return structured error responses with proper HTTP status codes and safe error messages"

patterns:
  - id: circuit_breaker
    name: Circuit Breaker
    description: >
      Prevents cascading failures by wrapping calls to external services in a
      circuit that trips open after repeated failures, redirecting to a fallback
      and periodically testing if the service has recovered.

    use_when:
      - "Calling unreliable external services or APIs"
      - "Downstream failures could cascade to upstream callers"
      - "System must remain partially functional during dependency outages"

    avoid_when:
      - "Single-process monolith with no external dependencies"
      - "Operation is critical and must always attempt (use retry instead)"

    tradeoffs:
      pros:
        - "Prevents cascade failures across services"
        - "Fails fast — no waiting for timeout on known-broken dependencies"
        - "Allows graceful degradation via fallback"
        - "Self-healing — periodically retests broken service"
      cons:
        - "Adds latency monitoring and state management"
        - "Half-open state testing can mask partial recovery"
        - "Threshold tuning requires production traffic analysis"

    implementation:
      guidelines:
        - "Track failure count within a rolling time window"
        - "Trip circuit to OPEN after failure threshold exceeded"
        - "Return fallback response immediately when circuit is OPEN"
        - "Transition to HALF-OPEN after recovery timeout — test with one request"
        - "Reset to CLOSED if test succeeds; back to OPEN if it fails"
        - "Configure per-dependency — different services have different failure profiles"

      common_errors:
        - error: "Single global circuit for all dependencies"
          impact: "One failing service trips the circuit for all services"
          fix: "Separate circuit breaker instance per downstream dependency"
        - error: "Circuit never trips (threshold too high)"
          impact: "System keeps hammering a dead service, wasting resources"
          fix: "Start conservative (5 failures in 30s), tune based on traffic patterns"
        - error: "No fallback when circuit is open"
          impact: "Users see raw errors instead of degraded but functional experience"
          fix: "Implement fallback: cached data, default response, or queued-for-later"

    maturity:
      level: standard

    standards:
      - name: Circuit Breaker Pattern
        type: spec
        role: "Resilience pattern for external service calls"
        status: recommended
        reference: "https://learn.microsoft.com/en-us/azure/architecture/patterns/circuit-breaker"

  - id: retry_with_backoff
    name: Retry with Exponential Backoff
    description: >
      Automatically retries failed operations with increasing delays between
      attempts, optionally with jitter to prevent thundering herd. Only safe
      for idempotent operations.

    use_when:
      - "Transient failures (network timeouts, temporary unavailability)"
      - "Operations are idempotent (safe to repeat)"
      - "Downstream service is generally reliable but has occasional blips"

    avoid_when:
      - "Operation is not idempotent (could cause duplicate side effects)"
      - "Error is permanent (4xx client errors — retrying won't help)"
      - "Tight latency budget that cannot accommodate retry delays"

    tradeoffs:
      pros:
        - "Handles transient failures transparently"
        - "Simple to implement and reason about"
        - "Jitter prevents synchronized retry storms"
      cons:
        - "Increases latency on failure paths"
        - "Can amplify load on already-struggling services without circuit breaker"
        - "Dangerous for non-idempotent operations"

    implementation:
      guidelines:
        - "Only retry idempotent operations (GET, PUT, DELETE — never blind POST retry)"
        - "Use exponential backoff: delay = base * 2^attempt (e.g., 100ms, 200ms, 400ms, 800ms)"
        - "Add jitter: delay = random(0, exponential_delay) to prevent thundering herd"
        - "Set maximum retry count (typically 3-5 attempts)"
        - "Set maximum total timeout (don't retry beyond the caller's deadline)"
        - "Only retry on retriable errors (5xx, timeout, connection refused — not 400, 401, 403)"

      common_errors:
        - error: "Retrying non-idempotent operations"
          impact: "Duplicate charges, duplicate records, duplicate notifications"
          fix: "Only retry operations that produce the same result when repeated (GET, PUT, DELETE)"
        - error: "No jitter on retry delays"
          impact: "All clients retry simultaneously after an outage, overwhelming the recovering service"
          fix: "Add random jitter to spread retries over time"
        - error: "Retrying 4xx client errors"
          impact: "Wasted resources — client errors won't resolve by retrying"
          fix: "Only retry 5xx, timeouts, and connection errors"

    maturity:
      level: standard

    standards:
      - name: Exponential Backoff with Jitter
        type: spec
        role: "Retry delay algorithm"
        status: recommended
        reference: "https://aws.amazon.com/builders-library/timeouts-retries-and-backoff-with-jitter/"

  - id: bulkhead_isolation
    name: Bulkhead Isolation
    description: >
      Isolates components into pools so that failure in one does not consume all
      system resources. Named after ship bulkheads that prevent water from flooding
      the entire hull. Limits the blast radius of failures.

    use_when:
      - "Multiple downstream dependencies with different reliability profiles"
      - "Critical paths must be protected from non-critical path failures"
      - "Thread/connection pool exhaustion is a risk"

    avoid_when:
      - "Single dependency with uniform failure characteristics"
      - "System resources are too limited for partitioning"

    tradeoffs:
      pros:
        - "Limits blast radius of failures"
        - "Protects critical paths from non-critical failures"
        - "Prevents resource exhaustion cascades"
      cons:
        - "Reduces overall resource utilization (partitioned pools)"
        - "Configuration complexity — sizing pools requires traffic analysis"
        - "Can cause failures under spiky traffic if pools are undersized"

    implementation:
      guidelines:
        - "Assign separate thread/connection pools per downstream dependency"
        - "Size pools based on expected traffic and acceptable queue depth"
        - "Monitor pool utilization and rejection rates"
        - "Combine with circuit breaker — bulkhead limits resources, circuit breaker limits attempts"
        - "Use queue-based bulkheads for async workloads"

      common_errors:
        - error: "Undersized bulkhead pools"
          impact: "Legitimate traffic rejected during normal spikes"
          fix: "Size pools based on P99 traffic, not average; monitor rejection rates"
        - error: "No monitoring on bulkhead state"
          impact: "Pools silently saturate without alerting"
          fix: "Monitor pool utilization, queue depth, and rejection counts"

    maturity:
      level: advanced

    standards:
      - name: Bulkhead Pattern
        type: spec
        role: "Failure isolation pattern"
        status: recommended
        reference: "https://learn.microsoft.com/en-us/azure/architecture/patterns/bulkhead"

  - id: structured_error_response
    name: Structured Error Response
    description: >
      Returns consistent, machine-parseable error responses with safe user messages,
      developer-useful details, and correlation IDs for debugging. Follows RFC 9457
      Problem Details format for HTTP APIs.

    use_when:
      - "Any API that returns errors to clients"
      - "User-facing applications needing safe error messages"
      - "Distributed systems needing error correlation"

    avoid_when:
      - "Internal batch jobs where log-based error handling suffices"

    tradeoffs:
      pros:
        - "Consistent error format across all services"
        - "Machine-parseable for automated error handling"
        - "Safe user messages prevent information leakage"
        - "Correlation IDs enable cross-service debugging"
      cons:
        - "Requires discipline to maintain consistency across teams"
        - "Additional error mapping layer for legacy services"

    implementation:
      guidelines:
        - "Use RFC 9457 Problem Details format for HTTP APIs"
        - "Include correlation ID in every error response and log entry"
        - "Never expose stack traces, SQL errors, or internal paths to clients"
        - "Map internal errors to safe user-facing messages"
        - "Use error codes (not just messages) for programmatic handling"
        - "Log full error context server-side; send safe summary to client"

      common_errors:
        - error: "Stack traces in production error responses"
          impact: "Exposes internal implementation details, file paths, dependency versions"
          fix: "Return generic error message to client; log full details server-side with correlation ID"
        - error: "Inconsistent error format across services"
          impact: "Clients need different parsing logic for each service"
          fix: "Standardize on RFC 9457 Problem Details across all services"
        - error: "No correlation ID"
          impact: "Cannot trace errors across multiple services in distributed system"
          fix: "Generate correlation ID at edge, propagate through all services, include in error response"

    maturity:
      level: standard

    standards:
      - name: RFC 9457
        type: spec
        role: "Problem Details for HTTP APIs"
        status: recommended
        reference: "https://www.rfc-editor.org/rfc/rfc9457"

examples:
  - id: circuit_breaker_states
    title: "Circuit Breaker State Machine"
    context: "Implementing a circuit breaker for an external payment service"
    correct: |
      circuit = CircuitBreaker(
        failure_threshold = 5,
        recovery_timeout = 30_seconds,
        half_open_max_calls = 1
      )

      function call_payment_service(request):
        if circuit.state == OPEN:
          return fallback_response("Payment service temporarily unavailable")

        try:
          response = http.post(payment_url, request, timeout=5_seconds)
          circuit.record_success()
          return response
        catch TimeoutError, ConnectionError:
          circuit.record_failure()
          if circuit.should_trip():
            circuit.trip()  # CLOSED -> OPEN
            log.warn("Circuit tripped for payment service")
          return fallback_response("Payment processing delayed")
    incorrect: |
      # WRONG: No circuit breaker — keeps hammering dead service
      function call_payment_service(request):
        for attempt in 1..10:
          try:
            return http.post(payment_url, request, timeout=30_seconds)
          catch:
            continue  # Keep retrying with long timeout
        raise "Payment failed after 10 attempts"
        # 10 attempts * 30s timeout = 5 minutes of blocked thread
    explanation: >
      A circuit breaker fails fast when a dependency is down, returning a fallback
      in milliseconds instead of blocking for minutes. The retry-forever approach
      wastes threads, amplifies load on the struggling service, and gives users
      a terrible experience.

  - id: structured_error_format
    title: "RFC 9457 Problem Details Response"
    context: "API returning a structured error for a validation failure"
    correct: |
      # HTTP 422 Unprocessable Entity
      {
        "type": "https://api.example.com/errors/validation",
        "title": "Validation Error",
        "status": 422,
        "detail": "The email field must be a valid email address",
        "instance": "/api/v1/users",
        "correlation_id": "req-abc-123-def",
        "errors": [
          { "field": "email", "message": "Invalid email format", "code": "INVALID_FORMAT" }
        ]
      }
    incorrect: |
      # WRONG: 200 with error in body + stack trace
      # HTTP 200 OK
      {
        "success": false,
        "error": "ValueError: invalid email at UserService.java:142\n  at Validator.validate(Validator.java:89)\n  at ...",
        "data": null
      }
    explanation: >
      RFC 9457 provides a standard error format that HTTP clients can parse
      programmatically. Correlation IDs enable debugging across services.
      Never expose stack traces — they reveal implementation details.

security_hardening:
  transport:
    requirements:
      - "Error responses must not vary based on authentication state (prevent user enumeration)"

  data_protection:
    requirements:
      - "Never expose internal error details (stack traces, SQL errors, file paths) to clients"
      - "Sanitize error messages to prevent information leakage"
      - "Log full error context server-side only"

  access_control:
    requirements:
      - "Error handling must not bypass authorization checks"
      - "Rate limit error-triggering requests to prevent error-based scanning"

  input_output:
    requirements:
      - "Validate error response format before sending (prevent injection via error messages)"
      - "Sanitize any user input reflected in error messages"

  secrets:
    requirements:
      - "Never include credentials, tokens, or secrets in error messages or logs"
      - "Redact sensitive parameters in error context"

  monitoring:
    requirements:
      - "Alert on error rate spikes (5xx rate > threshold)"
      - "Track error distribution by type, service, and endpoint"
      - "Monitor circuit breaker state changes"
      - "Alert when fallback usage exceeds threshold"

compliance:
  standards:
    - name: RFC 9457
      relevance: "Standard format for HTTP API error responses"
      reference: "https://www.rfc-editor.org/rfc/rfc9457"

    - name: OWASP Error Handling
      relevance: "Secure error handling to prevent information leakage"
      reference: "https://owasp.org/www-project-web-security-testing-guide/latest/4-Web_Application_Security_Testing/08-Testing_for_Error_Handling/"

  requirements_mapping:
    - control: error_information_leakage
      description: "Error responses do not reveal internal system details"
      maps_to:
        - "OWASP Error Handling"
        - "CWE-209: Generation of Error Message Containing Sensitive Information"

    - control: error_logging
      description: "All errors logged with context for debugging"
      maps_to:
        - "ISO 27001 A.12.4 (Logging and Monitoring)"

prompt_recipes:
  - id: greenfield_error_handling
    scenario: greenfield
    description: "Design error handling for a new distributed system"
    prompt: |
      Design error handling and resilience for a new distributed system.

      Context:
      - System type: [monolith/distributed/serverless]
      - Failure tolerance: [low/medium/high/critical]
      - Downstream reliability: [reliable/variable/unreliable]

      Requirements:
      - Circuit breaker per external dependency (threshold: 5 failures in 30s)
      - Retry with exponential backoff + jitter for idempotent operations only
      - Bulkhead isolation for critical vs non-critical paths
      - Structured error responses (RFC 9457)
      - Correlation IDs propagated through all services
      - Never expose internal errors to clients

  - id: audit_error_handling
    scenario: audit
    description: "Audit existing error handling implementation"
    prompt: |
      Audit the error handling implementation against these criteria:

      1. Are circuit breakers used for external service calls?
      2. Are retries limited to idempotent operations only?
      3. Is exponential backoff with jitter used for retries?
      4. Are error responses structured (RFC 9457 or equivalent)?
      5. Are correlation IDs present in all error responses and logs?
      6. Are stack traces hidden from client-facing responses?
      7. Is error rate monitored and alerted?
      8. Are circuit breaker state changes logged?
      9. Are fallback strategies defined for critical dependencies?
      10. Are bulkheads in place for resource isolation?

      For each item: report compliant/non-compliant/not-applicable with evidence.

  - id: resilience_patterns_selection
    scenario: architecture
    description: "Select appropriate resilience patterns"
    prompt: |
      Select resilience patterns for a service with these dependencies:

      Dependencies:
      [List each dependency with: name, reliability, criticality, idempotent?]

      For each dependency, determine:
      - Circuit breaker: Yes if reliability is variable/unreliable
      - Retry: Yes if operations are idempotent and errors are transient
      - Bulkhead: Yes if failure must not affect other dependencies
      - Fallback: Define degraded behavior when dependency is unavailable
      - Timeout: Define maximum wait time per dependency

  - id: migration_add_resilience
    scenario: migration
    description: "Add resilience to an existing system without circuit breakers"
    prompt: |
      Add resilience patterns to an existing system.

      Current state: [describe current error handling]

      Migration plan:
      1. Add structured error response format (RFC 9457) — lowest risk
      2. Add correlation IDs — requires header propagation
      3. Add circuit breakers per dependency — requires state management
      4. Add retry with backoff for idempotent operations — requires idempotency audit
      5. Add bulkheads for critical paths — requires resource pool configuration

      Implement in order. Each step is independently valuable.

anti_patterns:
  - name: "Swallowing exceptions"
    description: >
      Catching exceptions and silently ignoring them. The failure is invisible —
      no logging, no alerting, no error response. Data may be silently corrupted
      or operations may silently fail.
    fix: "Log every caught exception with context; re-throw or return an error if the operation failed"
    severity: critical
    related_pattern: structured_error_response

  - name: "Retry storms on non-idempotent operations"
    description: >
      Automatically retrying operations that are not idempotent (e.g., payment charges,
      email sends). Can result in duplicate charges, duplicate messages, or data corruption.
    fix: "Only retry idempotent operations; use idempotency keys for non-idempotent APIs"
    severity: critical
    related_pattern: retry_with_backoff

  - name: "Cascading failures from missing circuit breakers"
    description: >
      When service A calls service B which calls service C, and C goes down,
      all threads in B block on C's timeout, causing B to also become unresponsive,
      which cascades to A. The entire chain fails from one dependency.
    fix: "Circuit breaker per dependency with fast fallback; bulkhead isolation for critical paths"
    severity: critical
    related_pattern: circuit_breaker

  - name: "Exposing stack traces to clients"
    description: >
      Returning raw exception stack traces in API responses. Reveals internal
      file paths, class names, dependency versions, and database structure to
      potential attackers.
    fix: "Return safe, structured error messages; log full details server-side with correlation ID"
    severity: high
    related_pattern: structured_error_response

checklist:
  - id: ERR-01
    category: reliability
    description: "Circuit breaker implemented per external dependency"
    severity: critical
    verified_by: circuit_breaker

  - id: ERR-02
    category: reliability
    description: "Retries limited to idempotent operations only"
    severity: critical
    verified_by: retry_with_backoff

  - id: ERR-03
    category: reliability
    description: "Exponential backoff with jitter used for retries"
    severity: high
    verified_by: retry_with_backoff

  - id: ERR-04
    category: security
    description: "No stack traces or internal details in client-facing error responses"
    severity: critical
    verified_by: structured_error_response

  - id: ERR-05
    category: observability
    description: "Correlation ID present in all error responses and log entries"
    severity: high
    verified_by: structured_error_response

  - id: ERR-06
    category: design
    description: "Structured error response format used (RFC 9457 or equivalent)"
    severity: high
    verified_by: structured_error_response

  - id: ERR-07
    category: reliability
    description: "Fallback strategy defined for each critical dependency"
    severity: high
    verified_by: circuit_breaker

  - id: ERR-08
    category: reliability
    description: "Bulkhead isolation separates critical from non-critical paths"
    severity: high
    verified_by: bulkhead_isolation

  - id: ERR-09
    category: observability
    description: "Error rates monitored and alerted on threshold breach"
    severity: high
    verified_by: structured_error_response

  - id: ERR-10
    category: reliability
    description: "Circuit breaker state changes are logged and monitored"
    severity: medium
    verified_by: circuit_breaker

  - id: ERR-11
    category: reliability
    description: "Maximum retry count and total timeout configured per dependency"
    severity: high
    verified_by: retry_with_backoff

  - id: ERR-12
    category: security
    description: "Sensitive data (credentials, tokens) never included in error messages"
    severity: critical
    verified_by: structured_error_response
