  - id: VAL-03
    category: security
    description: "Unknown fields rejected (additionalProperties: false)"
    severity: high
    verified_by: schema_validation

  - id: VAL-04
    category: security
    description: "Allowlist validation used for security-sensitive fields"
    severity: high
    verified_by: allowlist_validation

  - id: VAL-05
    category: security
    description: "Output encoding applied context-aware (HTML, JS, URL, attribute)"
    severity: critical
    verified_by: output_encoding

  - id: VAL-06
    category: security
    description: "Content Security Policy header implemented for web apps"
    severity: high
    verified_by: output_encoding

  - id: VAL-07
    category: security
    description: "File uploads validated: MIME type + magic bytes + size + extension"
    severity: critical
    verified_by: allowlist_validation

  - id: VAL-08
    category: security
    description: "SQL queries parameterized (no string concatenation)"
    severity: critical
    verified_by: schema_validation

  - id: VAL-09
