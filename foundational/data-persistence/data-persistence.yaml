# =============================================================================
# AI Architecture Cookbook — Data Persistence
# Schema: v3 | Domain: data-persistence
# =============================================================================

meta:
  schema_version: 3
  domain: data-persistence
  version: "1.0.0"
  last_updated: 2026-04-22
  description: >
    Data persistence decision framework covering relational databases, document
    stores, key-value stores, caching layers, and event stores. Provides
    context-aware recommendations based on data shape, consistency needs,
    scale, and query patterns.

  tags:
    - database
    - persistence
    - sql
    - nosql
    - caching
    - event-store
    - data

  categories:
    - foundational

  prerequisites: []

  related_standards:
    - id: authentication
      relationship: complementary
      context: "Database access must use authenticated connections with least-privilege roles"
    - id: encryption
      relationship: complementary
      context: "Data at rest and in transit must be encrypted per encryption standard"
    - id: input-validation
      relationship: complementary
      context: "All data written to persistence must be validated and sanitized"
    - id: database-migration
      relationship: complementary
      context: "Schema changes must follow migration strategy for zero-downtime deployments"

context_inputs:
  - name: data_shape
    type: enum
    description: "Structure of the primary data model"
    required: true
    default: relational
    enum_values:
      - relational
      - document
      - key_value
      - graph
      - time_series
      - mixed

  - name: consistency_requirement
    type: enum
    description: "Required consistency level"
    required: true
    default: strong
    enum_values:
      - eventual
      - strong
      - tunable

  - name: read_write_ratio
    type: enum
    description: "Predominant workload pattern"
    required: true
    default: read_heavy
    enum_values:
      - read_heavy
      - write_heavy
      - balanced
      - append_only

  - name: scale_requirement
    type: enum
    description: "Expected data volume and throughput"
    required: true
    default: moderate
    enum_values:
      - small
      - moderate
      - large
      - massive

  - name: query_complexity
    type: enum
    description: "Complexity of queries needed"
    required: true
    default: moderate
    enum_values:
      - simple_lookups
      - moderate
      - complex_joins
      - full_text_search
      - aggregations

  - name: latency_requirement
    type: enum
    description: "Required read latency"
    required: false
    default: standard
    enum_values:
      - relaxed
      - standard
      - low
      - ultra_low

decision_tree:
  - id: ultra_low_latency_needs_cache
    priority: 1
    if:
      - latency_requirement == ultra_low
      - read_write_ratio == read_heavy
    then:
      pattern: caching_layer
      standards:
        - Cache-Aside Pattern
      notes: "Ultra-low latency reads require a caching layer in front of the primary store"

  - id: relational_data_needs_rdbms
    priority: 2
    if:
      - data_shape == relational
      - consistency_requirement == strong
    then:
      pattern: relational_database
      standards:
        - ACID
        - SQL
      notes: "Relational data with strong consistency needs an RDBMS with ACID transactions"
    else:
      pattern: document_store
      notes: "Non-relational data or eventual consistency — consider document or key-value stores"

  - id: document_data_needs_nosql
    priority: 3
    if:
      - data_shape == document
      - query_complexity in [simple_lookups, moderate]
    then:
      pattern: document_store
      standards:
        - Document Database
      notes: "Document-shaped data with moderate query needs fits document stores"

  - id: append_only_needs_event_store
    priority: 4
    if:
      - read_write_ratio == append_only
      - data_shape in [document, mixed]
    then:
      pattern: event_store
      standards:
        - Event Sourcing
      notes: "Append-only workloads with audit requirements fit event stores"

  - id: massive_scale_needs_distributed
    priority: 5
    if:
      - scale_requirement == massive
      - consistency_requirement in [eventual, tunable]
    then:
      pattern: document_store
      standards:
        - BASE
      notes: "Massive scale with relaxed consistency — use distributed NoSQL with horizontal scaling"

decision_metadata:
  confidence: high
  risk_if_wrong: high
  fallback:
    pattern: relational_database
    description: "Relational database with ACID transactions — safest default for most applications"

patterns:
  - id: relational_database
    name: Relational Database
    description: >
      Structured data storage with ACID transactions, referential integrity,
      and SQL query language. The default choice for most business applications
      where data relationships matter and consistency is required.

    use_when:
      - "Data has clear relationships (foreign keys, joins)"
      - "ACID transactions required (financial, inventory, bookings)"
      - "Complex queries with joins, aggregations, and reporting"
      - "Data integrity and referential integrity are critical"

    avoid_when:
      - "Data is inherently unstructured or schema-less"
      - "Horizontal scaling beyond single-node capacity is needed"
      - "Ultra-low latency key lookups are the primary pattern"
      - "Schema changes are frequent and unpredictable"

    tradeoffs:
      pros:
        - "ACID guarantees — data integrity by default"
        - "Powerful query language (SQL) with decades of optimization"
        - "Referential integrity via foreign keys"
        - "Rich ecosystem of tools, ORMs, and expertise"
      cons:
        - "Horizontal scaling is limited (read replicas, not horizontal writes)"
        - "Schema changes require migrations"
        - "Join-heavy queries can degrade at massive scale"
        - "Object-relational impedance mismatch with application code"

    implementation:
      guidelines:
        - "Use connection pooling — never open a connection per request"
        - "Index columns used in WHERE, JOIN, and ORDER BY clauses"
        - "Use parameterized queries (never concatenate SQL strings)"
        - "Design schema in third normal form; denormalize for proven performance needs"
        - "Use transactions for multi-step operations that must be atomic"
        - "Implement read replicas for read-heavy workloads"

      common_errors:
        - error: "No connection pooling"
          impact: "Connection overhead per request; connection exhaustion under load"
          fix: "Use a connection pool (HikariCP, PgBouncer, etc.) sized to expected concurrency"
        - error: "SQL injection via string concatenation"
          impact: "Attackers can read, modify, or delete any data in the database"
          fix: "Always use parameterized queries / prepared statements"
        - error: "Missing indexes on query columns"
          impact: "Full table scans on every query; response time degrades with data growth"
          fix: "Add indexes on columns used in WHERE, JOIN, and ORDER BY; use EXPLAIN to verify"

    maturity:
      level: standard

    standards:
      - name: ACID
        type: spec
        role: "Transaction guarantee model (Atomicity, Consistency, Isolation, Durability)"
        status: recommended
      - name: SQL
        type: spec
        role: "Structured Query Language standard"
        status: recommended
        reference: "ISO/IEC 9075"

  - id: document_store
    name: Document Store
    description: >
      Schema-flexible storage for semi-structured data (JSON/BSON documents).
      Supports horizontal scaling, denormalized data models, and flexible
      queries without predefined schema.

    use_when:
      - "Data is naturally document-shaped (product catalogs, content, user profiles)"
      - "Schema evolves frequently and unpredictably"
      - "Horizontal scaling is a primary requirement"
      - "Most queries access a single document or simple aggregations"

    avoid_when:
      - "Data requires multi-document ACID transactions"
      - "Complex joins across collections are needed"
      - "Referential integrity between entities is critical"

    tradeoffs:
      pros:
        - "Flexible schema — no migration for new fields"
        - "Horizontal scaling via sharding"
        - "Natural mapping to application objects (JSON to object)"
        - "High write throughput for denormalized models"
      cons:
        - "No native joins — data must be denormalized or joined in application"
        - "Eventual consistency in distributed mode (by default)"
        - "Data duplication from denormalization increases storage and update complexity"

    implementation:
      guidelines:
        - "Model data by access patterns, not entity relationships"
        - "Embed related data that is always accessed together (denormalize)"
        - "Reference data that is accessed independently or changes frequently"
        - "Use compound indexes for common query patterns"
        - "Set appropriate write/read concern levels for consistency needs"
        - "Plan sharding strategy before data grows (shard key selection is critical)"

      common_errors:
        - error: "Relational modeling in a document database"
          impact: "Multiple queries needed to assemble related data (simulating joins)"
          fix: "Denormalize — embed data that is read together; reference only when necessary"
        - error: "Bad shard key selection"
          impact: "Hot shards — uneven data distribution causing one shard to be overloaded"
          fix: "Choose shard key with high cardinality, even distribution, and common in queries"
        - error: "Unbounded array growth in documents"
          impact: "Document size exceeds limits; updates become slow"
          fix: "Use bucket pattern for arrays that grow over time; reference when array is large"

    maturity:
      level: standard

    standards:
      - name: Document Database
        type: spec
        role: "Semi-structured data storage model"
        status: recommended

  - id: caching_layer
    name: Caching Layer
    description: >
      In-memory data store providing sub-millisecond read latency for frequently
      accessed data. Acts as a fast-path in front of slower primary storage.

    use_when:
      - "Read-heavy workloads where same data is accessed repeatedly"
      - "Primary database cannot meet latency requirements"
      - "Computed results are expensive and cacheable"
      - "Session storage needs fast access"

    avoid_when:
      - "Data changes frequently and stale reads are unacceptable"
      - "Working set does not fit in memory (cache miss rate too high)"
      - "Write-through consistency is required for every operation"

    tradeoffs:
      pros:
        - "Sub-millisecond read latency"
        - "Offloads read traffic from primary database"
        - "Enables horizontal scaling of read capacity"
      cons:
        - "Cache invalidation complexity (stale data risk)"
        - "Additional infrastructure to manage"
        - "Memory cost for caching layer"
        - "Cache stampede risk during cold start or invalidation"

    implementation:
      guidelines:
        - "Use cache-aside (lazy loading) as default pattern"
        - "Set TTL on all cache entries — never cache without expiration"
        - "Implement cache invalidation on write (invalidate or update-through)"
        - "Use consistent hashing for distributed cache clusters"
        - "Implement cache stampede protection (locking, probabilistic early expiry)"
        - "Monitor cache hit rate — below 80% indicates poor caching strategy"

      common_errors:
        - error: "No TTL on cache entries"
          impact: "Stale data served indefinitely; cache grows unbounded"
          fix: "Set TTL on every cache entry; shorter TTL for frequently changing data"
        - error: "Cache stampede on popular keys"
          impact: "Hundreds of concurrent requests rebuild the same cache entry simultaneously"
          fix: "Use lock-based or probabilistic early expiration to prevent stampede"
        - error: "Caching everything"
          impact: "Memory exhaustion; evicts useful cache entries for rarely accessed data"
          fix: "Cache only frequently accessed data with clear access patterns; monitor hit rates"

    maturity:
      level: standard

    standards:
      - name: Cache-Aside Pattern
        type: spec
        role: "Lazy-loading cache pattern"
        status: recommended
        reference: "https://learn.microsoft.com/en-us/azure/architecture/patterns/cache-aside"

  - id: event_store
    name: Event Store
    description: >
      Append-only persistence that stores every state change as an immutable
      event. The current state is derived by replaying events. Provides
      complete audit trail and enables temporal queries.

    use_when:
      - "Complete audit trail is required (financial, healthcare, legal)"
      - "Need to reconstruct state at any point in time"
      - "Event-driven architecture with event sourcing"
      - "Write workload is primarily append-only"

    avoid_when:
      - "Simple CRUD with no audit requirements"
      - "Queries primarily need current state (event replay adds latency)"
      - "Team unfamiliar with event sourcing patterns"

    tradeoffs:
      pros:
        - "Complete audit trail — every change recorded"
        - "Temporal queries — state at any point in time"
        - "Natural fit for event-driven architectures"
        - "No data loss — events are immutable"
      cons:
        - "Complexity of event replay for current state"
        - "Event schema evolution is challenging"
        - "Read model must be projected (CQRS pattern)"
        - "Storage grows with every state change"

    implementation:
      guidelines:
        - "Events are immutable — never update or delete events"
        - "Use snapshots to avoid replaying entire event stream (snapshot every N events)"
        - "Implement CQRS — separate read models projected from event stream"
        - "Version event schemas — support old and new event formats"
        - "Use optimistic concurrency on event streams"

      common_errors:
        - error: "Querying event store directly for current state"
          impact: "Replaying thousands of events per read request is slow"
          fix: "Project read models (CQRS) that maintain current state"
        - error: "Breaking event schema backward compatibility"
          impact: "Existing events cannot be replayed with new code"
          fix: "Version events; support upcasting old events to new format"

    maturity:
      level: advanced

    standards:
      - name: Event Sourcing
        type: spec
        role: "Append-only event persistence pattern"
        status: recommended
        reference: "https://learn.microsoft.com/en-us/azure/architecture/patterns/event-sourcing"

  - id: polyglot_persistence
    name: Polyglot Persistence
    description: >
      Using multiple database technologies in a single system, each chosen for
      its strength in handling a specific data access pattern. Different services
      own different stores.

    use_when:
      - "Different parts of the system have fundamentally different data needs"
      - "Microservices architecture where each service owns its data"
      - "Single database type creates significant impedance mismatch"

    avoid_when:
      - "Team cannot support multiple database technologies"
      - "Monolith with uniform data access patterns"
      - "Cross-store transactions are frequently needed"

    tradeoffs:
      pros:
        - "Each data store optimized for its access pattern"
        - "Better performance per use case"
        - "Service independence in microservices"
      cons:
        - "Operational complexity — multiple technologies to manage"
        - "Cross-store consistency requires saga or event-based coordination"
        - "Team must have expertise across multiple databases"

    implementation:
      guidelines:
        - "Choose database per service based on primary access pattern"
        - "Use events for cross-service data synchronization (not shared databases)"
        - "Each service owns its data store exclusively"
        - "Implement saga pattern for cross-service transactions"
        - "Standardize operational practices (backup, monitoring) across all stores"

      common_errors:
        - error: "Shared database across microservices"
          impact: "Tight coupling — schema changes affect all services"
          fix: "Each service owns its database; synchronize via events or APIs"
        - error: "Cross-store distributed transactions"
          impact: "Two-phase commit across different databases is fragile and slow"
          fix: "Use saga pattern with compensating transactions"

    maturity:
      level: advanced

    standards:
      - name: Database per Service
        type: spec
        role: "Microservice data isolation pattern"
        status: recommended

examples:
  - id: connection_pool_parameterized
    title: "Connection Pooling and Parameterized Queries"
    context: "Accessing a relational database from an application service"
    correct: |
      # Connection pool configured at application startup
      pool = create_connection_pool(
        host = config.db_host,
        max_connections = 20,
        min_connections = 5,
        max_idle_time = 300_seconds
      )

      # Parameterized query (safe from SQL injection)
      function get_user(user_id):
        connection = pool.acquire()
        try:
          result = connection.execute(
            "SELECT id, name, email FROM users WHERE id = $1",
            [user_id]
          )
          return result.first()
        finally:
          pool.release(connection)
    incorrect: |
      # WRONG: New connection per request + SQL injection
      function get_user(user_id):
        connection = database.connect(host, user, password)  # New connection every time
        result = connection.execute(
          "SELECT * FROM users WHERE id = " + user_id  # SQL injection!
        )
        connection.close()
        return result
    explanation: >
      Connection pooling avoids the overhead of creating connections per request.
      Parameterized queries prevent SQL injection by separating code from data.
      String concatenation allows attackers to inject arbitrary SQL.

  - id: cache_aside_pattern
    title: "Cache-Aside with Stampede Protection"
    context: "Implementing caching for frequently accessed product data"
    correct: |
      function get_product(product_id):
        # Try cache first
        cached = cache.get("product:" + product_id)
        if cached is not None:
          return cached

        # Cache miss — acquire lock to prevent stampede
        lock = cache.acquire_lock("lock:product:" + product_id, timeout=5_seconds)
        if lock:
          try:
            # Double-check after acquiring lock
            cached = cache.get("product:" + product_id)
            if cached is not None:
              return cached

            # Fetch from database
            product = database.query("SELECT ... WHERE id = $1", [product_id])
            cache.set("product:" + product_id, product, ttl=300_seconds)
            return product
          finally:
            lock.release()
        else:
          # Could not acquire lock — wait and retry cache
          wait(100_milliseconds)
          return get_product(product_id)
    incorrect: |
      # WRONG: No TTL, no stampede protection
      function get_product(product_id):
        cached = cache.get("product:" + product_id)
        if cached:
          return cached
        # 100 concurrent requests all miss cache and hit DB simultaneously
        product = database.query("SELECT * FROM products WHERE id = " + product_id)
        cache.set("product:" + product_id, product)  # No TTL — never expires
        return product
    explanation: >
      Cache-aside with lock-based stampede protection ensures only one request
      rebuilds the cache while others wait. TTL prevents stale data. Without these
      protections, popular keys cause thundering herd on cache miss.

security_hardening:
  transport:
    requirements:
      - "Database connections use TLS (encrypted in transit)"
      - "Connection strings never include plaintext credentials in source code"

  data_protection:
    requirements:
      - "Sensitive data encrypted at rest (column-level or full-disk)"
      - "PII data identified, classified, and retention-policy enforced"
      - "Backup data encrypted with same or stronger controls"

  access_control:
    requirements:
      - "Least-privilege database users per service (not shared superuser)"
      - "Network-level access control (firewall, VPC, private endpoints)"
      - "No direct database access from public networks"

  input_output:
    requirements:
      - "Parameterized queries only — no SQL string concatenation"
      - "ORM configured to prevent mass assignment vulnerabilities"
      - "Query result sets bounded (LIMIT/pagination) to prevent memory exhaustion"

  secrets:
    requirements:
      - "Database credentials in secrets manager, not environment variables or code"
      - "Credential rotation automated with zero-downtime"
      - "Service accounts use short-lived tokens where supported"

  monitoring:
    requirements:
      - "Monitor query performance (slow query log)"
      - "Alert on connection pool exhaustion"
      - "Track and alert on failed authentication attempts"
      - "Audit log for DDL operations and privileged access"

compliance:
  standards:
    - name: OWASP Injection
      relevance: "SQL injection prevention"
      reference: "https://owasp.org/Top10/A03_2021-Injection/"

    - name: PCI DSS
      relevance: "Cardholder data storage requirements"
      reference: "PCI DSS v4.0 Requirement 3"

    - name: GDPR
      relevance: "Personal data storage, retention, and deletion"
      reference: "GDPR Article 5 (storage limitation)"

  requirements_mapping:
    - control: sql_injection_prevention
      description: "All database queries use parameterized statements"
      maps_to:
        - "OWASP A03:2021 Injection"
        - "CWE-89: SQL Injection"

    - control: data_encryption
      description: "Sensitive data encrypted at rest and in transit"
      maps_to:
        - "PCI DSS Requirement 3.5"
        - "GDPR Article 32"

prompt_recipes:
  - id: greenfield_persistence
    scenario: greenfield
    description: "Choose a persistence strategy for a new application"
    prompt: |
      Choose a data persistence strategy for a new application.

      Context:
      - Data shape: [relational/document/key_value/graph/time_series/mixed]
      - Consistency requirement: [eventual/strong/tunable]
      - Read/write ratio: [read_heavy/write_heavy/balanced/append_only]
      - Scale requirement: [small/moderate/large/massive]
      - Query complexity: [simple_lookups/moderate/complex_joins/full_text_search]

      Default: Relational database with ACID transactions unless evidence
      against it. Use parameterized queries, connection pooling, and indexes.

      Add caching layer if: read-heavy + latency-sensitive.
      Add event store if: audit trail required + append-only workload.

  - id: audit_persistence
    scenario: audit
    description: "Audit existing data persistence implementation"
    prompt: |
      Audit the data persistence implementation:

      1. Are all queries parameterized (no SQL injection)?
      2. Is connection pooling configured and properly sized?
      3. Are indexes present on all queried columns?
      4. Is data encrypted at rest?
      5. Are database connections encrypted (TLS)?
      6. Are credentials in a secrets manager (not in code)?
      7. Is the cache layer using TTL on all entries?
      8. Are cache stampede protections in place?
      9. Is query performance monitored (slow query log)?
      10. Are backups encrypted and tested for restore?

      For each item: report compliant/non-compliant/not-applicable with evidence.

  - id: migration_nosql
    scenario: migration
    description: "Evaluate migrating from relational to NoSQL"
    prompt: |
      Evaluate whether migrating to NoSQL is justified.

      Current state: [describe current RDBMS, pain points, scale]

      Evaluate:
      - Are joins causing performance problems at scale?
      - Is schema rigidity slowing feature development?
      - Is horizontal write scaling needed beyond RDBMS limits?
      - Can the team support a different database technology?
      - Can eventual consistency be tolerated?

      If yes to most: NoSQL may be justified (document store or key-value).
      If no: Optimize the relational database (read replicas, indexing, caching).

  - id: caching_strategy
    scenario: architecture
    description: "Design a caching strategy"
    prompt: |
      Design a caching strategy for the application.

      For each cached entity, define:
      - Cache pattern: cache-aside, read-through, write-through, write-behind
      - TTL: How long before expiration
      - Invalidation: When and how to invalidate
      - Stampede protection: Lock-based or probabilistic early expiry
      - Monitoring: Hit rate target (>80%), miss rate alerting

      Rules:
      - Never cache without TTL
      - Never cache sensitive data without encryption
      - Never cache user-specific data in shared cache without proper key isolation

anti_patterns:
  - name: "SQL injection via string concatenation"
    description: >
      Building SQL queries by concatenating user input into the query string.
      Allows attackers to execute arbitrary SQL commands, potentially reading,
      modifying, or deleting all data in the database.
    fix: "Always use parameterized queries / prepared statements"
    severity: critical
    related_pattern: relational_database

  - name: "Shared database across microservices"
    description: >
      Multiple microservices reading from and writing to the same database tables.
      Creates tight coupling — any schema change affects all services. Loses the
      independent deployability that is the core benefit of microservices.
    fix: "Database per service; synchronize via events or APIs"
    severity: high
    related_pattern: polyglot_persistence

  - name: "No connection pooling"
    description: >
      Opening a new database connection for every request. Connection creation
      involves TCP handshake, TLS negotiation, and authentication — taking
      50-200ms per connection. Under load, connection limits are exhausted.
    fix: "Use connection pooling (HikariCP, PgBouncer) sized to expected concurrency"
    severity: high
    related_pattern: relational_database

  - name: "Unbounded queries without pagination"
    description: >
      Querying a table without LIMIT, returning all rows. As data grows,
      response size and memory consumption grow unbounded, eventually causing
      out-of-memory errors or timeout.
    fix: "Always paginate queries; use cursor-based pagination for large datasets"
    severity: high
    related_pattern: relational_database

  - name: "Cache without TTL"
    description: >
      Storing data in cache without expiration. Data becomes permanently stale
      and cache grows unbounded until memory is exhausted, causing evictions
      of more useful entries or out-of-memory crashes.
    fix: "Set TTL on every cache entry; monitor hit rates and stale data percentage"
    severity: high
    related_pattern: caching_layer

