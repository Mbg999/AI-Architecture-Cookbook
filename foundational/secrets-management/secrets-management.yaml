# =============================================================================
# AI Architecture Cookbook — Secrets Management
# Schema: v3 | Domain: secrets-management
# =============================================================================

meta:
  schema_version: 3
  domain: secrets-management
  version: "1.0.0"
  last_updated: "2026-04-22"
  description: >
    Secrets management patterns for securely storing, accessing, and rotating
    credentials, API keys, certificates, and encryption keys. Covers vault
    services, environment-based injection, automatic rotation, and zero-trust
    secret access.

  tags:
    - security
    - secrets
    - vault
    - credentials
    - api-keys
    - certificates
    - rotation
    - kms
    - zero-trust

  categories:
    - foundational

  prerequisites:
    - encryption
    - authentication

  related_standards:
    - id: encryption
      relationship: complementary
      context: "Encryption keys are secrets managed by this pattern"
    - id: configuration-management
      relationship: complementary
      context: "Secrets are a special category of configuration requiring additional protection"
    - id: ci-cd
      relationship: complementary
      context: "CI/CD pipelines need secure secret injection"
    - id: containerization
      relationship: complementary
      context: "Container workloads need secure secret mounting"

context_inputs:
  - name: infrastructure
    type: enum
    description: "Primary infrastructure platform"
    required: true
    default: cloud_managed
    enum_values:
      - on_premises
      - cloud_managed
      - multi_cloud
      - hybrid

  - name: secret_volume
    type: enum
    description: "Number and variety of secrets managed"
    required: true
    default: moderate
    enum_values:
      - few
      - moderate
      - many
      - enterprise_scale

  - name: rotation_requirement
    type: enum
    description: "How frequently secrets must rotate"
    required: true
    default: periodic
    enum_values:
      - manual
      - periodic
      - frequent
      - zero_standing

  - name: compliance_level
    type: enum
    description: "Compliance requirements for secret handling"
    required: true
    default: standard
    enum_values:
      - basic
      - standard
      - regulated
      - critical_infrastructure

decision_tree:
  - id: critical_zero_standing
    priority: 1
    if:
      - compliance_level == critical_infrastructure
      - rotation_requirement == zero_standing
    then:
      pattern: zero_trust_secret_access
      standards:
        - "NIST SP 800-57"
      notes: >
        Critical infrastructure with zero standing privilege requires
        just-in-time secret access with dynamic credentials that
        expire after single use.

  - id: enterprise_cloud
    priority: 2
    if:
      - secret_volume in [many, enterprise_scale]
      - infrastructure in [cloud_managed, multi_cloud]
    then:
      pattern: centralized_vault
      standards:
        - "NIST SP 800-57"
      notes: >
        Enterprise-scale cloud deployments should use a centralized vault
        service with automatic rotation, audit logging, and policy-based
        access control.

  - id: regulated_rotation
    priority: 3
    if:
      - compliance_level in [regulated, critical_infrastructure]
      - rotation_requirement in [periodic, frequent]
    then:
      pattern: centralized_vault
      standards:
        - "PCI DSS 3.6"
      notes: >
        Regulated environments require centralized secret management
        with audit trails, automatic rotation, and access policies.

  - id: standard_deployment
    priority: 4
    if:
      - secret_volume in [few, moderate]
      - compliance_level in [basic, standard]
    then:
      pattern: environment_injection
      standards:
        - "12-Factor App"
      notes: >
        Standard deployments with few secrets can use environment-based
        injection from platform secret stores (Kubernetes Secrets, cloud
        secret managers).

decision_metadata:
  confidence: high
  risk_if_wrong: critical
  fallback:
    pattern: centralized_vault
    description: "A centralized vault is the safest default for any production secret management"

patterns:
  - id: centralized_vault
    name: "Centralized Vault Service"
    description: >
      Store all secrets in a dedicated vault service with access control
      policies, audit logging, automatic rotation, and dynamic secret
      generation. Applications authenticate to the vault to retrieve
      secrets at runtime.
    use_when:
      - "Production systems with multiple services"
      - "Need audit trail for secret access"
      - "Compliance requires controlled secret management"
      - "Multiple teams sharing infrastructure"
    avoid_when:
      - "Single developer local development (use environment variables)"
    tradeoffs:
      pros:
        - "Centralized control and audit trail"
        - "Automatic rotation without application changes"
        - "Policy-based access control"
        - "Dynamic secret generation (short-lived credentials)"
      cons:
        - "Additional infrastructure to maintain"
        - "Vault availability is critical (apps cannot start without it)"
        - "Initial setup and migration effort"
    implementation:
      guidelines:
        - "Choose vault: HashiCorp Vault, AWS Secrets Manager, Azure Key Vault, GCP Secret Manager"
        - "Authenticate applications using workload identity (not static credentials to access the vault)"
        - "Organize secrets by path: /{environment}/{service}/{secret-name}"
        - "Implement least privilege: each service can only access its own secrets"
        - "Enable audit logging for all secret read/write operations"
        - "Configure automatic rotation for database credentials and API keys"
        - "Use dynamic secrets where possible: vault generates short-lived DB credentials on demand"
        - "Implement secret caching in application with TTL (avoid vault calls on every request)"
        - "Set up high availability: vault outage should not cause application outage"
        - "Back up vault data (encrypted) and test restoration procedures"
      common_errors:
        - error: "Using a static API key to authenticate to the vault"
          impact: "Chicken-and-egg problem: the vault credential is itself an unmanaged secret"
          fix: "Use workload identity (AWS IAM role, Kubernetes service account, Azure managed identity)"
        - error: "No caching — vault call on every request"
          impact: "High latency and vault overload; vault outage causes immediate application failure"
          fix: "Cache secrets locally with TTL; refresh before expiry; handle vault unavailability gracefully"
    maturity:
      level: enterprise
    standards:
      - name: "NIST SP 800-57 (Key Management)"
        type: standard
        role: "Key management recommendations"
        status: recommended

  - id: environment_injection
    name: "Environment-Based Secret Injection"
    description: >
      Inject secrets into the application runtime via environment variables
      or mounted files, managed by the deployment platform's secret store.
      Secrets never appear in application code, config files, or container
      images.
    use_when:
      - "Container and serverless deployments"
      - "12-factor application architecture"
      - "Platform-native secret management is sufficient"
    avoid_when:
      - "Need dynamic rotation without redeployment"
      - "Need cross-service secret sharing with fine-grained access control"
    tradeoffs:
      pros:
        - "Simple: uses platform-native capabilities"
        - "No additional infrastructure"
        - "Follows 12-factor app principles"
      cons:
        - "Rotation requires redeployment or restart"
        - "Environment variables visible via process inspection on the host"
        - "Limited audit trail compared to vault"
    implementation:
      guidelines:
        - "Store secrets in platform secret store: Kubernetes Secrets (encrypted at rest), AWS SSM Parameter Store, etc."
        - "Inject as environment variables or mounted files (prefer mounted files for large secrets like certificates)"
        - "Never commit secrets to version control — use .gitignore and pre-commit hooks"
        - "Use separate secret stores per environment (dev, staging, production)"
        - "Mark Kubernetes Secrets for encryption at rest (EncryptionConfiguration)"
        - "Limit who can read secrets in the platform (RBAC on secret resources)"
        - "Rotate secrets by updating the secret store and restarting affected pods/functions"
        - "Use external-secrets operator or similar to sync from vault to Kubernetes Secrets"
      common_errors:
        - error: "Secrets in container image layers or Dockerfile"
          impact: "Anyone with image access can extract secrets; they persist in image history"
          fix: "Inject at runtime via environment variables or volume mounts; never copy secrets during build"
        - error: "Kubernetes Secrets without encryption at rest"
          impact: "Secrets stored as base64 in etcd — readable by anyone with etcd access"
          fix: "Enable encryption at rest for Kubernetes Secrets (EncryptionConfiguration with KMS provider)"
    maturity:
      level: standard
    standards:
      - name: "12-Factor App (Config)"
        type: practice
        role: "Configuration management best practices"
        status: recommended
        reference: "https://12factor.net/config"

  - id: zero_trust_secret_access
    name: "Zero-Trust Secret Access"
    description: >
      No standing credentials. All secrets are dynamic, short-lived, and
      issued just-in-time based on verified workload identity. Database
      credentials, API keys, and service tokens are generated on demand
      and expire after use.
    use_when:
      - "Critical infrastructure with zero standing privilege requirements"
      - "Maximum security posture needed"
      - "Insider threat protection"
    avoid_when:
      - "Infrastructure does not support workload identity"
      - "Applications cannot handle credential refresh"
    tradeoffs:
      pros:
        - "No long-lived credentials to steal"
        - "Automatic expiration limits breach window"
        - "Full audit trail of every credential issuance"
        - "No credential sprawl"
      cons:
        - "Significant infrastructure complexity"
        - "Application must handle credential refresh"
        - "Credential issuer availability is critical"
    implementation:
      guidelines:
        - "Authenticate workloads via platform identity (SPIFFE/SPIRE, cloud IAM, Kubernetes service accounts)"
        - "Generate database credentials on demand with vault dynamic secrets (e.g., Vault database engine)"
        - "Issue short-lived API tokens: minutes to hours, not days"
        - "Use mutual TLS with auto-rotating certificates (cert-manager, Vault PKI)"
        - "Implement credential lease: application renews or gets new credential before expiry"
        - "No human access to production credentials — all access through approved automation"
        - "Break-glass procedure: emergency access with enhanced logging and automatic revocation"
        - "Monitor for credential misuse: access patterns inconsistent with workload profile"
      common_errors:
        - error: "Dynamic credentials without lease renewal"
          impact: "Application loses database connection when credential expires"
          fix: "Implement proactive lease renewal: refresh at 50-75% of TTL"
        - error: "No break-glass procedure"
          impact: "Cannot access production during emergency when automation fails"
          fix: "Define break-glass with strong authentication, enhanced logging, and time-limited access"
    maturity:
      level: enterprise
    standards:
      - name: "SPIFFE (Secure Production Identity Framework)"
        type: standard
        role: "Workload identity framework"
        status: recommended
        reference: "https://spiffe.io/"

  - id: secret_rotation
    name: "Automatic Secret Rotation"
    description: >
      Automate the rotation of secrets on a defined schedule without
      application downtime. Supports dual-credential strategies where
      old and new credentials are valid during rotation window.
    use_when:
      - "All production environments (rotation is always recommended)"
      - "Compliance requirements mandate periodic rotation"
      - "After a suspected credential compromise"
    avoid_when:
      - "Never skip rotation for production secrets"
    tradeoffs:
      pros:
        - "Limits window of exposure for compromised credentials"
        - "Compliance with rotation requirements"
        - "No human intervention needed"
      cons:
        - "Rotation logic can be complex (dual-credential, grace period)"
        - "Failed rotation can cause outage"
    implementation:
      guidelines:
        - "Define rotation schedule: database passwords (90 days), API keys (180 days), certificates (before expiry)"
        - "Use dual-credential rotation: issue new credential, update consumers, revoke old credential"
        - "During rotation window: both old and new credentials are valid (grace period)"
        - "Automate rotation with vault rotation lambdas/functions or built-in rotation"
        - "Test rotation in non-production first: verify application handles credential refresh"
        - "Alert on rotation failure: failed rotation is a security risk"
        - "Implement emergency rotation: ability to rotate immediately on suspected compromise"
        - "Certificate rotation: use short-lived certificates (hours/days) with auto-renewal"
      common_errors:
        - error: "Rotating without a grace period"
          impact: "Application using old credential fails immediately when new credential is activated"
          fix: "Dual-credential strategy: old credential remains valid for grace period after new one is active"
        - error: "No monitoring of rotation success"
          impact: "Rotation silently fails; credentials never actually change"
          fix: "Monitor rotation execution; alert on failure; verify new credential works before revoking old"
    maturity:
      level: standard
    standards:
      - name: "PCI DSS 3.6"
        type: standard
        role: "Cryptographic key management requirements"
        status: recommended

examples:
  - id: vault_access_example
    title: "Application Secret Access — Vault with Workload Identity"
    context: "Application authenticating to vault using workload identity and caching secrets"
    correct: |
      # Application secret access via vault with workload identity
      import os
      from functools import lru_cache
      from datetime import datetime, timedelta, timezone

      class SecretManager:
          def __init__(self, vault_client):
              self.vault = vault_client
              self._cache = {}

          def _authenticate(self):
              """Authenticate using workload identity — no static credentials."""
              # Kubernetes: uses service account token
              # Cloud: uses instance metadata / managed identity
              self.vault.auth.kubernetes(
                  role="my-service",
                  jwt=read_service_account_token()
              )

          def get_secret(self, path, ttl_seconds=300):
              """Retrieve secret with caching."""
              cached = self._cache.get(path)
              if cached and cached["expires_at"] > datetime.now(timezone.utc):
                  return cached["value"]

              # Fetch from vault
              secret = self.vault.secrets.kv.read(path)
              self._cache[path] = {
                  "value": secret["data"],
                  "expires_at": datetime.now(timezone.utc) + timedelta(seconds=ttl_seconds)
              }
              return secret["data"]

          def get_dynamic_db_credential(self):
              """Get short-lived database credential from vault."""
              cred = self.vault.secrets.database.generate_credentials("my-db-role")
              # Credential has a lease — vault will revoke it after TTL
              return {
                  "username": cred["data"]["username"],
                  "password": cred["data"]["password"],
                  "lease_id": cred["lease_id"],
                  "lease_duration": cred["lease_duration"],
              }

      # Usage
      secrets = SecretManager(vault_client)
      db_cred = secrets.get_dynamic_db_credential()
      api_key = secrets.get_secret("my-service/api-keys/payment-provider")
    incorrect: |
      # WRONG: Secrets in code and environment without protection
      import os

      # WRONG: Hardcoded secret in source code
      DATABASE_PASSWORD = "super-secret-password-123"

      # WRONG: API key in config file committed to git
      config = {
          "api_key": "sk-live-abcdef123456",
          "db_host": "prod-db.example.com",
          "db_password": DATABASE_PASSWORD,
      }

      # WRONG: Secret in Dockerfile
      # ENV API_KEY=sk-live-abcdef123456

      # WRONG: No rotation, no expiry, no audit trail
      # WRONG: Same credentials across all environments
    explanation: >
      The correct implementation uses workload identity to authenticate to
      vault (no static credentials), caches secrets with TTL, uses dynamic
      database credentials that expire automatically, and has audit trail
      via vault logging. The incorrect version has hardcoded secrets,
      secrets in config files committed to git, and no rotation or auditing.

security_hardening:
  transport:
    requirements:
      - "All vault communication over mTLS"
      - "Secret values never logged or transmitted in plaintext"
  data_protection:
    requirements:
      - "Vault storage backend encrypted at rest"
      - "Secrets in memory cleared after use where language supports it"
  access_control:
    requirements:
      - "Vault access policies enforce least privilege per service"
      - "Human access to production secrets requires approval workflow"
  input_output:
    requirements:
      - "Secrets never appear in error messages, logs, or API responses"
      - "Secret values masked in CI/CD pipeline logs"
  secrets:
    requirements:
      - "Vault unseal keys distributed using Shamir's Secret Sharing"
      - "Root tokens generated, used, and revoked immediately"
  monitoring:
    requirements:
      - "All secret read/write operations logged with service identity"
      - "Alert on unauthorized secret access attempts"
      - "Monitor rotation success and failure"

compliance:
  standards:
    - name: "NIST SP 800-57 (Key Management)"
      relevance: "Cryptographic key management lifecycle"
    - name: "PCI DSS Requirement 3.5-3.6"
      relevance: "Protecting stored cryptographic keys"
    - name: "SOC 2 CC6.1"
      relevance: "Logical and physical access controls"

  requirements_mapping:
    - control: secret_storage
      description: "Secrets stored in dedicated secure storage, not application code or config"
      maps_to:
        - "PCI DSS 3.5"
        - "SOC 2 CC6.1"
    - control: secret_rotation
      description: "Automated rotation of credentials on defined schedule"
      maps_to:
        - "PCI DSS 3.6.4"
        - "NIST SP 800-57"
    - control: secret_access_audit
      description: "All secret access logged with identity and timestamp"
      maps_to:
        - "SOC 2 CC7.2"
        - "PCI DSS 10.2"

prompt_recipes:
  - id: secrets_greenfield
    scenario: greenfield
    description: "Design secrets management for a new application"
    prompt: |
      Design secrets management for a new application.

      Context:
      - Infrastructure: [Kubernetes/cloud serverless/VMs/hybrid]
      - Cloud provider: [AWS/Azure/GCP/multi-cloud]
      - Number of services: [specify]
      - Compliance: [standard/regulated/critical]

      Requirements:
      - Vault service selection
      - Authentication strategy (workload identity)
      - Secret organization and access policies
      - Rotation strategy and schedule
      - CI/CD secret injection
      - Emergency rotation procedure

  - id: secrets_audit
    scenario: audit
    description: "Audit secrets management practices"
    prompt: |
      Audit secrets management:

      1. Are any secrets hardcoded in source code?
      2. Are any secrets in configuration files committed to git?
      3. Are secrets in environment variables or vault?
      4. Is workload identity used for vault authentication?
      5. Are secrets rotated automatically?
      6. Is secret access logged and audited?
      7. Are least privilege policies enforced per service?
      8. Are development and production secrets separated?
      9. Is there an emergency rotation procedure?
      10. Are secret detection tools running in CI (gitleaks, detect-secrets)?

  - id: secrets_migration
    scenario: migration
    description: "Migrate from hardcoded secrets to vault"
    prompt: |
      Migrate from hardcoded/environment secrets to centralized vault.

      Steps:
      1. Inventory all secrets (scan code, config, environment variables)
      2. Set up vault service with HA
      3. Configure workload identity authentication
      4. Migrate secrets to vault (one service at a time)
      5. Update applications to read from vault
      6. Configure automatic rotation
      7. Set up monitoring and alerting
      8. Rotate all migrated secrets (old values may be compromised)
      9. Verify no secrets remain in old locations
      10. Enable secret detection in CI to prevent regression

  - id: secrets_rotation
    scenario: operations
    description: "Implement automatic secret rotation"
    prompt: |
      Implement automatic secret rotation.

      For each secret type:
      1. Database passwords: dual-credential rotation every 90 days
      2. API keys: rotate every 180 days or on suspected compromise
      3. TLS certificates: auto-renew 30 days before expiry
      4. Service tokens: short-lived (hours), auto-refresh
      5. Encryption keys: annual rotation with re-encryption schedule

      For each, define:
      - Rotation trigger (schedule or event)
      - Rotation procedure (dual-credential, generate-new, etc.)
      - Validation (verify new secret works)
      - Rollback (revert if rotation fails)
      - Monitoring (alert on failure)

anti_patterns:
  - name: "Secrets in Source Code"
    description: >
      Hardcoding API keys, database passwords, or tokens directly in
      source code. Secrets are exposed to anyone with repository access,
      persist in git history even after removal, and leak via public repos.
    fix: "Use vault or environment injection; run secret detection in CI to prevent commits"
    severity: critical
    related_pattern: centralized_vault

  - name: "Shared Credentials Across Environments"
    description: >
      Using the same database password, API key, or service account
      across development, staging, and production. A compromise in any
      environment exposes all environments.
    fix: "Unique credentials per environment; separate vault paths per environment"
    severity: high
    related_pattern: environment_injection

  - name: "Never-Rotated Credentials"
    description: >
      Credentials that have never been rotated since creation. The longer
      a credential exists, the more likely it has been compromised through
      logging, screenshots, developer laptops, or backup exposure.
    fix: "Implement automatic rotation; start with database passwords and API keys"
    severity: high
    related_pattern: secret_rotation

