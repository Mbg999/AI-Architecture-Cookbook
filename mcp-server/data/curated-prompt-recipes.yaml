api-design:
  - id: curated_api_greenfield_v1
    scenario: greenfield
    description: Curated API design prompt focusing on versioning and client needs
    prompt: >
      Design a public-facing REST API for an application that will serve web and mobile clients. Consider versioning,
      backward compatibility, authentication, rate-limiting, pagination, filtering, idempotency, and observability.
      Provide recommended HTTP resource models, URL layout, expected status codes, and recommended headers. Provide a
      concise one-paragraph rationale and a short example of an OpenAPI path for a core resource.
  - id: curated_api-design_auto_v1
    scenario: greenfield
    description: Auto-generated curated prompt for api-design (synthesized from domain metadata).
    prompt: >-
      You are an expert in api-design.

      Description: API design decision framework covering REST, GraphQL, gRPC, and WebSocket protocols. Provides
      context-aware recommendations based on client types, data complexity, performance needs, and team expertise.

      Context placeholders (provide values for the following):

      - client_types (enum, required, default: web_and_mobile) choices: web_only, mobile_only, web_and_mobile,
      internal_services, third_party, mixed — Primary consumers of the API

      - data_complexity (enum, required, default: moderate) choices: simple, moderate, complex, deeply_nested —
      Complexity of the data graph clients need to query

      - performance_requirement (enum, required, default: standard) choices: relaxed, standard, low_latency,
      ultra_low_latency — Latency and throughput requirements

      - real_time_needed (boolean, required) — Does the API need to push real-time updates to clients?

      - team_expertise (enum, default: rest_familiar) choices: rest_familiar, graphql_experienced, grpc_experienced,
      polyglot — Team familiarity with API paradigms

      - public_api (boolean, required) — Is this a public-facing API for external consumers?

      - contract_strictness (enum, default: moderate) choices: loose, moderate, strict — How strict should the API
      contract be?

      Task: Based on the description and context values, provide:

      - Top recommended architectural patterns and a one-paragraph rationale.

      - Key tradeoffs (pros/cons).

      - A short implementation checklist (3–6 items).

      - A brief example snippet or configuration as an illustration.
search:
  - id: curated_search_relevance_v1
    scenario: greenfield
    description: Curated search prompt to design relevance, index strategy, and ranking
    prompt: >
      Design a search system for a product catalog with faceted filters and typo tolerance. Requirements: low latency
      (<100ms median query), per-user personalization optional, near-realtime index updates, support for multi-field
      ranking and synonyms, explainability for results, and privacy controls for PII. Outline index schema, ranking
      signals, query rewriting, and a scaling plan that includes sharding and replica strategies.
  - id: curated_search_auto_v1
    scenario: greenfield
    description: Auto-generated curated prompt for search (synthesized from domain metadata).
    prompt: >-
      You are an expert in search.

      Description: Search infrastructure patterns including full-text search engines, indexing strategies, query
      optimization, faceted search, and search relevance tuning. Covers both dedicated search engines and database
      full-text search capabilities.

      Context placeholders (provide values for the following):

      - search_engine (enum, required, default: dedicated_engine) choices: dedicated_engine, database_fulltext, hybrid —
      Search engine technology

      - data_volume (enum, required, default: medium) choices: small, medium, large, very_large — Volume of searchable
      data

      - query_complexity (enum, default: moderate) choices: simple, moderate, complex, ai_powered — Complexity of search
      queries

      - freshness_requirement (enum, default: near_realtime) choices: realtime, near_realtime, periodic, batch — How
      quickly new data must be searchable

      Task: Based on the description and context values, provide:

      - Top recommended architectural patterns and a one-paragraph rationale.

      - Key tradeoffs (pros/cons).

      - A short implementation checklist (3–6 items).

      - A brief example snippet or configuration as an illustration.
rate-limiting:
  - id: curated_rate_limiting_tactics
    scenario: greenfield
    description: Curated prompt for rate-limiting strategy including client tiers and burst handling
    prompt: >
      Design a rate-limiting and throttling strategy for public APIs with free and paid tiers. Requirements: protect
      backend from spikes, per-user and per-IP limits, burst capacity allowed, graceful status responses, integration
      with token-based auth and API keys, and telemetry for enforcement. Provide token-bucket configuration per tier, a
      sliding-window example, and recommended client-facing error messages and Retry-After semantics.
  - id: curated_rate-limiting_auto_v1
    scenario: greenfield
    description: Auto-generated curated prompt for rate-limiting (synthesized from domain metadata).
    prompt: >-
      You are an expert in rate-limiting.

      Description: Rate limiting, throttling, and abuse prevention for APIs and services. Covers token bucket, sliding
      window, distributed rate limiting, and quota management strategies.

      Context placeholders (provide values for the following):

      - rate_limit_scope (enum, required, default: per_api_key) choices: per_ip, per_api_key, per_user, per_tenant,
      global — At what level are rate limits applied?

      - architecture_type (enum, required, default: distributed) choices: single_instance, distributed, edge_gateway —
      Deployment architecture affecting rate limit strategy

      - traffic_pattern (enum, required, default: steady) choices: steady, bursty, scheduled_spikes, unpredictable —
      Expected traffic pattern

      - rate_limit_strictness (enum, default: standard) choices: relaxed, standard, strict — How strict must enforcement
      be?

      Task: Based on the description and context values, provide:

