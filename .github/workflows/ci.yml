name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    name: Build and test mcp-server
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install Node dependencies
        run: |
          cd mcp-server
          npm ci

      - name: Build
        run: |
          cd mcp-server
          npm run build

      - name: TypeScript type-check (tests)
        run: |
          cd mcp-server
          npm run test:tsc

      - name: Run tests (dynamic runner)
        run: |
          cd mcp-server
          npm test --silent

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Python dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run YAML validator
        run: |
          python tools/validate.py
